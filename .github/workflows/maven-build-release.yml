name: Maven Build & Release

permissions:
  contents: write

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from pom.xml
        id: pom_version
        run: |
          version=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-jars
          path: |
            target/WorldManager-*.jar
            !target/original-WorldManager-*.jar
          retention-days: 30

      - name: Find shaded JAR
        id: find_shaded
        run: |
          jar=$(find target -maxdepth 1 -name 'WorldManager-*.jar' ! -name 'original-*' | head -n1 || true)
          if [ -z "$jar" ]; then
            echo "No jar found in target/"; exit 1
          fi
          echo "path=$jar" >> $GITHUB_OUTPUT
          echo "name=$(basename $jar)" >> $GITHUB_OUTPUT

      - name: Create Git tag and GitHub Release
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version='${{ steps.pom_version.outputs.version }}'
          tag="v${version}"
          jar='${{ steps.find_shaded.outputs.path }}'

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; nothing to do."
            exit 0
          fi

          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            if ! git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git tag -a "$tag" -m "Release $tag"
              git push origin "$tag"
            fi
          fi

          gh release create "$tag" "$jar" \
            --title "$tag" \
            --notes "Automated release from pom.xml version $version"

