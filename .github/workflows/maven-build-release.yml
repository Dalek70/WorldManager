name: Maven Build & Release

permissions:
  contents: write

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-jars
          path: |
            target/WorldManager-*.jar
            !target/original-WorldManager-*.jar
          retention-days: 30

      - name: Find shaded JAR
        id: find_shaded
        run: |
          jar=$(ls target/*.jar | grep -v original | head -n1 || true)
          if [ -z "$jar" ]; then
            echo "No jar found in target/"; exit 1
          fi
          echo "path=$jar" >> $GITHUB_OUTPUT
          echo "name=$(basename $jar)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Automated release created by GitHub Actions
          draft: false
          prerelease: false

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_shaded.outputs.path }}
          asset_name: ${{ steps.find_shaded.outputs.name }}
          asset_content_type: application/java-archive

